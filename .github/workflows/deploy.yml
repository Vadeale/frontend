name: Deploy Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required variables
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ vars.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -e
          required_vars=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PORT VITE_API_BASE_URL)
          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub variable: $name"
              exit 1
            fi
          done

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ vars.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT }}
          envs: VITE_API_BASE_URL
          script: |
            set -e
            cd /var/www/zadashka/frontend
            git fetch --all
            git reset --hard origin/main
            rm -rf node_modules
            npm ci
            export VITE_API_BASE_URL="${VITE_API_BASE_URL}"
            npm run build
            sudo nginx -t
            sudo systemctl reload nginx